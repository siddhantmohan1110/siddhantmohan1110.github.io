<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8" />
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#157878" />

    <!-- Cayman theme CSS -->
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  </head>

  <body>
    <header class="page-header" role="banner">
      <div class="cayman-header-wrap">
        <img src="{{ "/assets/images/profile.jpeg" | relative_url }}" alt="Siddhant Mohan" class="cayman-header-photo" />

        <div class="cayman-header-text">
          <h1 class="project-name">{{ site.title | default: page.title }}</h1>
          <h2 class="project-tagline">{{ site.description | default: page.description }}</h2>
        </div>
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
      <footer class="site-footer"></footer>
    </main>
  </body>
</html>
